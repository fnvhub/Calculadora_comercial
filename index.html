  {id:"argumento", label:"Argumento"},
  {id:"informe",   label:"Informe"},

  const [t1e, setT1e]                 = useState(50);
  const [t1d, setT1d]                 = useState(34);
  const [t2e, setT2e]                 = useState(120);
  const [t2d, setT2d]                 = useState(36);
  const [rappelE, setRappelE]         = useState(500);
  const [rappelP, setRappelP]         = useState(2);
  const [tab, setTab]                 = useState("simulador");
  const [search, setSearch]           = useState("");
  const [open, setOpen]               = useState(false);
  const [prod, setProd]               = useState(PRODUCTOS[84]);
  const dropRef                       = useRef(null);
  const [descLineal, setDescLineal]   = useState(34);
  const [pvlComp, setPvlComp]         = useState(+(PRODUCTOS[84].pvp * 0.8).toFixed(2));
  const [descDto, setDescDto]         = useState(10);
  const [tieneOferta, setTieneOferta] = useState(false);
  const [compra, setCompra]           = useState(10);
  const [regalo, setRegalo]           = useState(1);

  useEffect(() => {
    const fn = (e) => { if (dropRef.current && !dropRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", fn);
    return () => document.removeEventListener("mousedown", fn);
  }, []);

  const selectProd = (p) => {
    setProd(p);
    setPvlComp(+(p.pvp * (1 - pvlPct/100)).toFixed(2));
    setSearch(""); setOpen(false);
  };

  const filtered = PRODUCTOS.filter(p => p.nombre.toLowerCase().includes(search.toLowerCase()));
  const lista    = search ? filtered : PRODUCTOS;

  const calc = useMemo(() => {
    const pvp       = prod.pvp;
    const neto      = pvp * (1 - descLineal/100);
    const dtoPvp    = ((pvp - pvlComp) / pvp) * 100;
    const tras      = pvlComp * (1 - descDto/100);
    const totalUds  = tieneOferta ? compra + regalo : compra;
    const netoComp  = tieneOferta
      ? (compra > 0 ? (tras * compra) / totalUds : tras)
      : tras;
    const gana      = netoComp < neto;
    const dif       = netoComp - neto;
    const margen    = ((pvp - neto) / pvp) * 100;
    const conRappel = neto * (1 - rappelP/100);
    return { neto, dtoPvp, netoComp, gana, dif, margen, conRappel };
  }, [prod, descLineal, pvlComp, descDto, tieneOferta, compra, regalo, rappelP]);

  const exportCSV = () => {
    const rows = [
      ["SIMULACIÓN DE RENTABILIDAD — NO OFICIAL"],
      ["Generado con IA · Solo orientativo"],
      ["Fecha:", new Date().toLocaleDateString("es-ES")],
      [],
      ["Producto:", prod.nombre, prod.pres],
      ["EAN:", prod.ean],
      ["PVP:", prod.pvp],
      [],
      ["CONCEPTO","MI PROPUESTA","COMPETENCIA (estimación)"],
      ["Precio base","PVP: "+f(prod.pvp),"PVL: "+f(pvlComp)],
      ["Descuento s/PVP","-"+p(descLineal)+" lineal","-"+p(calc.dtoPvp)+" s/PVP"],
      ["Dto. comercial adicional","Ninguno (sin mínimos)",p(descDto)+" s/PVL"],
      ["Bonificación","No aplica", tieneOferta ? compra+"+"+regalo+" uds." : "No aplica"],
      ["COSTE NETO / UNIDAD", f(calc.neto), f(calc.netoComp)],
      [],
      ["Rápel anual orientativo:", "A partir de "+rappelE+"€/año → +"+rappelP+"%"],
      ["Neto estimado con rápel:", f(calc.conRappel)],
      [],
      ["AVISO: Simulación IA. Datos competencia son estimaciones. No es oferta oficial."],
    ];
    const csv = rows.map(r=>r.map(c=>`"${c??''}"`).join(",")).join("\n");
    const b   = new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
    const u   = URL.createObjectURL(b);
    const a   = document.createElement("a");
    a.href=u; a.download=`Simulacion_${prod.nombre.replace(/\s/g,"_")}.csv`; a.click();
    URL.revokeObjectURL(u);
  };

  const card   = {background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:12,padding:"14px 16px"};
  const badge  = (col) => ({background:col,color:"#fff",fontSize:10,fontWeight:900,padding:"2px 10px",borderRadius:20,textTransform:"uppercase",display:"inline-block"});

  return (
    <div style={{minHeight:"100vh",background:"#f1f5f9",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"}}>

      <div className="no-print" style={{background:"#0f172a",color:"#fff",padding:"16px 16px 0"}}>
        <div style={{maxWidth:800,margin:"0 auto"}}>

          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <span style={{fontSize:18}}>📊</span>
            <span style={{fontWeight:900,fontSize:15,letterSpacing:-.3}}>Comparativa de Rentabilidad · Nutergia 2026</span>
          </div>

          <div ref={dropRef} style={{position:"relative",marginBottom:8}}>
            <div style={{display:"flex",gap:8}}>
              <div style={{position:"relative",flex:1}}>
                <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:14,color:"#94a3b8"}}>🔍</span>
                <input
                  type="text" placeholder="Buscar producto..."
                  value={search}
                  onChange={e=>{setSearch(e.target.value);setOpen(true);}}
                  onFocus={()=>setOpen(true)}
                  style={{width:"100%",padding:"9px 10px 9px 32px",background:"#1e293b",border:"1px solid #334155",borderRadius:10,color:"#fff",fontSize:14,outline:"none"}}
                />
              </div>
              <button
                onClick={()=>{setSearch("");setOpen(!open);}}
                style={{background:"#1e293b",border:"1px solid #334155",borderRadius:10,color:"#fff",padding:"0 14px",fontSize:18,cursor:"pointer"}}
              >▾</button>
            </div>

            {open && (
              <div className="dropdown-scroll" style={{position:"absolute",zIndex:999,width:"100%",marginTop:4,background:"#fff",border:"1px solid #e2e8f0",borderRadius:12,boxShadow:"0 8px 32px rgba(0,0,0,.18)"}}>
                {lista.length===0
                  ? <div style={{padding:"12px 14px",fontSize:13,color:"#94a3b8"}}>Sin resultados</div>
                  : lista.map(p=>(
                    <div key={p.ean}
                      onClick={()=>selectProd(p)}
                      style={{padding:"10px 14px",borderBottom:"1px solid #f1f5f9",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}
                      onMouseEnter={e=>e.currentTarget.style.background="#eff6ff"}
                      onMouseLeave={e=>e.currentTarget.style.background=""}
                    >
                      <div>
                        <div style={{fontWeight:700,fontSize:13,color:"#1e293b"}}>{p.nombre}</div>
                        <div style={{fontSize:11,color:"#94a3b8"}}>{p.pres}</div>
                      </div>
                      <span style={{fontWeight:900,color:"#2563eb",fontSize:13,marginLeft:8,flexShrink:0}}>{f(p.pvp)}</span>
                    </div>

              </div>
            )}

          <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div>

              <span style={{fontSize:11,color:"#64748b",marginLeft:8}}>{prod.pres}</span>
            </div>
            <span style={{fontWeight:900,color:"#60a5fa",fontSize:14,flexShrink:0,marginLeft:8}}>{f(prod.pvp)} <span style={{fontSize:10,fontWeight:400,color:"#475569"}}>PVP</span></span>

                  Con estas condiciones la competencia queda en {f(calc.netoComp)}, por debajo de tu precio neto ({f(calc.neto)}). Ajusta los parámetros.

            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
                <span style={{fontWeight:900,fontSize:13,color:"#1d4ed8",textTransform:"uppercase",letterSpacing:.5}}>Mi descuento lineal s/PVP</span>
                <span style={{fontWeight:900,fontSize:36,color:"#2563eb"}}>{descLineal}%</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
                <span style={{fontSize:11,fontWeight:700,color:"#2563eb",width:52,textAlign:"right",flexShrink:0}}>{f(calc.neto)}</span>
                <input type="range" min="20" max="55" step="1" value={descLineal}
                  onChange={e=>setDescLineal(+e.target.value)}
                  style={{flex:1,accentColor:"#2563eb"}}
                />
                <span style={{fontSize:11,fontWeight:700,color:"#94a3b8",width:52,flexShrink:0}}>{f(prod.pvp)}</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#94a3b8",padding:"0 62px",marginBottom:10}}>
                <span>← neto</span><span>PVP →</span>
              </div>
              <div style={{background:"#2563eb",color:"#fff",borderRadius:16,padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:10,opacity:.7,textTransform:"uppercase",letterSpacing:1}}>Precio neto unitario</div>
                  <div style={{fontSize:32,fontWeight:900,marginTop:2}}>{f(calc.neto)}</div>
                </div>
                <div style={{textAlign:"right",fontSize:11,opacity:.7,lineHeight:1.8}}>
                  <div>Sin mínimos</div>
                  <div>desde {t1e}€ → {t1d}%</div>
                  <div>desde {t2e}€ → {t2d}%</div>
                </div>
              </div>
            </div>

            <div>
              <div style={{fontWeight:900,fontSize:13,color:"#b45309",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Competencia — su idioma</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                <div style={card}>
                  <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",marginBottom:4}}>PVL Competencia</div>
                  <input type="number" step="0.01" value={pvlComp}
                    onChange={e=>setPvlComp(parseFloat(e.target.value)||0)}
                    style={{fontSize:20,fontWeight:900,width:"100%",border:"none",background:"transparent",outline:"none",color:"#1e293b"}}
                  />
                  <div style={{fontSize:11,fontWeight:700,color:"#d97706",marginTop:4}}>= -{p(calc.dtoPvp)} s/PVP</div>
                </div>
                <div style={card}>
                  <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",marginBottom:4}}>Dto. comercial s/PVL</div>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <input type="number" step="1" value={descDto}
                      onChange={e=>setDescDto(parseFloat(e.target.value)||0)}
                      style={{fontSize:20,fontWeight:900,width:"100%",border:"none",background:"transparent",outline:"none",color:"#1e293b"}}
                    />
                    <span style={{fontWeight:700,fontSize:18,color:"#64748b"}}>%</span>
                  </div>
                  <div style={{fontSize:11,color:"#94a3b8",marginTop:4}}>sobre el PVL</div>
                </div>
              </div>

              <div style={{...card,marginBottom:10}}>
                <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
                  <div style={{position:"relative",width:44,height:24,flexShrink:0}}>
                    <input type="checkbox" checked={tieneOferta} onChange={e=>setTieneOferta(e.target.checked)}
                      style={{opacity:0,width:0,height:0,position:"absolute"}}
                    />
                    <div style={{position:"absolute",inset:0,borderRadius:12,background:tieneOferta?"#2563eb":"#cbd5e1",transition:"background .2s"}}></div>
                    <div style={{position:"absolute",top:3,left:tieneOferta?22:3,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left .2s",boxShadow:"0 1px 4px rgba(0,0,0,.2)"}}></div>
                  </div>
                  <div>
                    <div style={{fontWeight:700,fontSize:13,color:"#1e293b"}}>¿Hacen oferta C+R?</div>
                    <div style={{fontSize:11,color:"#94a3b8"}}>Compra + regalo (bonificación)</div>
                  </div>
                </label>
                {tieneOferta && (
                  <div style={{marginTop:12,display:"flex",alignItems:"center",gap:10,paddingTop:12,borderTop:"1px solid #e2e8f0"}}>
                    <span style={{fontSize:12,color:"#64748b",fontWeight:600}}>Compra</span>
                    <input type="number" value={compra} min="1"
                      onChange={e=>setCompra(parseInt(e.target.value)||1)}
                      style={{width:52,padding:"6px 8px",border:"1.5px solid #e2e8f0",borderRadius:8,textAlign:"center",fontWeight:900,fontSize:15,outline:"none"}}
                    />
                    <span style={{fontWeight:700,color:"#94a3b8",fontSize:16}}>+</span>
                    <input type="number" value={regalo} min="0"
                      onChange={e=>setRegalo(parseInt(e.target.value)||0)}
                      style={{width:52,padding:"6px 8px",border:"1.5px solid #fbbf24",borderRadius:8,textAlign:"center",fontWeight:900,fontSize:15,color:"#b45309",background:"#fffbeb",outline:"none"}}
                    />
                    <span style={{fontSize:12,color:"#64748b",fontWeight:600}}>regalo</span>
                  </div>
                )}
              </div>

              <div style={{background:calc.gana?"#fef2f2":"#fffbeb",border:`1.5px solid ${calc.gana?"#fca5a5":"#fcd34d"}`,borderRadius:16,padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:10,fontWeight:700,color:"#b45309",textTransform:"uppercase",letterSpacing:.5}}>Neto efectivo competencia</div>
                  <div style={{fontSize:28,fontWeight:900,color:calc.gana?"#b91c1c":"#92400e",marginTop:2}}>{f(calc.netoComp)}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:11,color:"#94a3b8"}}>diferencia</div>
                  <div style={{fontSize:18,fontWeight:900,color:calc.dif>0?"#16a34a":"#dc2626"}}>{calc.dif>0?"+":""}{f(calc.dif)}</div>
                  <div style={{fontSize:11,color:"#94a3b8"}}>{calc.dif>0?"✓ gano yo":"⚠ gana ellos"}</div>
                </div>
              </div>
            </div>

            <div style={{border:"1.5px dashed #e2e8f0",borderRadius:12,padding:"10px 14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:11,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>Rápel anual (orientativo)</span>
                <span style={{fontSize:12,color:"#64748b"}}>a partir de {rappelE}€/año → <strong style={{color:"#15803d"}}>+{rappelP}%</strong></span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:12,color:"#64748b"}}>
                <span>Neto con rápel incluido:</span>
                <strong style={{color:"#15803d"}}>{f(calc.conRappel)}</strong>
              </div>
            </div>
          </div>
        )}

        {tab==="argumento" && (
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",paddingBottom:14,borderBottom:"2px solid #e2e8f0"}}>
              <div>
                <div style={{fontWeight:900,fontSize:18,color:"#0f172a"}}>Argumento de Rentabilidad</div>
                <div style={{fontWeight:700,fontSize:13,color:"#2563eb",marginTop:2}}>{prod.nombre} · PVP {f(prod.pvp)}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0,marginLeft:12}}>
                <span style={badge("#2563eb")}>Nutergia 2026</span>
                <div style={{fontSize:11,color:"#94a3b8",marginTop:4}}>{new Date().toLocaleDateString("es-ES")}</div>
              </div>
            </div>

            <div style={{background:"#2563eb",color:"#fff",borderRadius:16,padding:"16px 20px"}}>
              <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:1,opacity:.7,marginBottom:8}}>Mi propuesta — descuento lineal s/PVP</div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,fontWeight:700,opacity:.85,marginBottom:6}}>
                <span>{f(calc.neto)}</span>
                <span style={{fontSize:24,fontWeight:900,color:"#fff"}}>{descLineal}%</span>
                <span>{f(prod.pvp)}</span>
              </div>
              <div style={{position:"relative",height:14,background:"rgba(255,255,255,.25)",borderRadius:7,overflow:"hidden"}}>
                <div style={{position:"absolute",left:0,top:0,height:"100%",borderRadius:7,background:"#fff",width:`${descLineal}%`,transition:"width .3s"}}></div>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10,opacity:.6,marginTop:4}}>
                <span>← precio neto</span><span>PVP →</span>
              </div>
            </div>

            <div style={{...card,lineHeight:1.7,fontSize:13,color:"#374151",display:"flex",flexDirection:"column",gap:10}}>
              <p>El margen estándar que los laboratorios conceden a la farmacia en España —el <strong>PVL</strong>— se sitúa habitualmente en torno al <strong>28% sobre el PVP</strong>. Sobre ese PVL, la competencia añade descuentos comerciales y bonificaciones para resultar competitiva.</p>
              <p>Mi propuesta aplica directamente <strong>{descLineal}% sobre el PVP desde el primer pedido</strong> — {(descLineal-28).toFixed(0)} puntos por encima del margen estándar, sin negociar unidades mínimas ni cajas.</p>
            </div>

            <div style={{background:"#f0fdf4",border:"1.5px solid #bbf7d0",borderRadius:12,padding:"12px 16px"}}>
              <div style={{fontWeight:900,fontSize:13,color:"#15803d",marginBottom:8}}>✓ Sin mínimos de compra</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {[[t1e,t1d],[t2e,t2d]].map(([e,d],i)=>(
                  <div key={i} style={{background:"#fff",border:"1px solid #dcfce7",borderRadius:10,padding:"10px",textAlign:"center"}}>
                    <div style={{fontSize:24,fontWeight:900,color:"#2563eb"}}>{d}%</div>
                    <div style={{fontSize:11,color:"#64748b",marginTop:2}}>desde <strong>{e}€</strong></div>
                  </div>
                ))}
              </div>
              <div style={{fontSize:11,color:"#15803d",marginTop:8}}>Sin contar por cajas, ni unidades, ni referencias mínimas.</div>
            </div>

            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead>
                  <tr style={{background:"#0f172a",color:"#fff"}}>
                    {["Escenario","Dto s/PVP","Precio neto"].map((h,i)=>(
                      <th key={i} style={{padding:"10px 12px",textAlign:i===0?"left":"center",fontWeight:700}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {[
                    {label:"Mi propuesta", sub:"", dto:descLineal, neto:calc.neto, highlight:true},
                    {label:"Comp. solo PVL", sub:"(28% s/PVP)", dto:28, neto:prod.pvp*0.72},
                    {label:"Comp. PVL + 10%", sub:"", dto:null, label2:"-28% +10%", neto:prod.pvp*0.72*0.9},
                    {label:"Comp. PVL + 10% + 10+1", sub:"", dto:null, label2:"-28%+10%+bono", neto:prod.pvp*0.72*0.9*10/11},
                  ].map((r,i)=>(
                    <tr key={i} style={{background:r.highlight?"#eff6ff":"#fff",borderBottom:"1px solid #f1f5f9"}}>
                      <td style={{padding:"10px 12px",fontWeight:r.highlight?900:400,color:r.highlight?"#1d4ed8":"#374151"}}>{r.label} <span style={{fontSize:10,color:"#94a3b8"}}>{r.sub}</span></td>
                      <td style={{padding:"10px 12px",textAlign:"center",fontWeight:r.highlight?900:400,color:r.highlight?"#2563eb":"#64748b"}}>{r.dto!=null?`-${p(r.dto)}`:r.label2}</td>
                      <td style={{padding:"10px 12px",textAlign:"center",fontWeight:r.highlight?900:700,fontSize:r.highlight?15:13,color:r.highlight?"#1d4ed8":"#374151"}}>{f(r.neto)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <div style={{...card,fontSize:12,color:"#374151"}}>
              <strong>+ Rápel anual:</strong> superando <strong>{rappelE}€</strong> en compras anuales, {rappelP}% adicional acumulable. Precio estimado con rápel: <strong style={{color:"#15803d"}}>{f(calc.conRappel)}</strong>.
            </div>

            <div style={{background:"#f8fafc",borderLeft:"4px solid #cbd5e1",borderRadius:"0 8px 8px 0",padding:"10px 14px",display:"flex",gap:8,alignItems:"flex-start"}}>
              <span style={{fontSize:14,flexShrink:0}}>⚠️</span>
              <span style={{fontSize:11,color:"#64748b"}}><strong>Simulación orientativa generada con IA.</strong> Datos de mercado basados en estándares del sector. No es oferta vinculante.</span>
            </div>

            <button className="no-print" style={btn("#0f172a")} onClick={()=>window.print()}>
              ⬇ Imprimir / Guardar PDF
            </button>
          </div>
        )}

        {tab==="informe" && (
          <div>
            <div style={{border:"2px solid #e2e8f0",borderRadius:16,padding:"16px",marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",paddingBottom:12,borderBottom:"1px solid #e2e8f0",marginBottom:14}}>
                <div>
                  <div style={{fontWeight:900,fontSize:16,color:"#0f172a",textTransform:"uppercase"}}>Propuesta Comercial</div>
                  <div style={{fontWeight:700,fontSize:13,color:"#2563eb",marginTop:2}}>{prod.nombre}</div>
                  <div style={{fontSize:11,color:"#94a3b8"}}>{prod.pres} · EAN {prod.ean}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0,marginLeft:12}}>
                  <span style={badge("#ef4444")}>⚠ No Oficial</span>
                  <div style={{fontSize:11,color:"#ea580c",fontWeight:700,marginTop:4}}>Simulación IA</div>
                  <div style={{fontSize:11,color:"#94a3b8"}}>{new Date().toLocaleDateString("es-ES")}</div>
                </div>
              </div>

              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead>
                    <tr style={{background:"#0f172a",color:"#fff"}}>
                      {["Concepto","Mi propuesta","Competencia (est.)"].map((h,i)=>(
                        <th key={i} style={{padding:"10px 12px",textAlign:i===0?"left":"center",fontWeight:700}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    <tr style={{background:"#f8fafc",borderBottom:"1px solid #f1f5f9"}}>
                      <td style={{padding:"10px 12px",fontWeight:700,fontSize:11,color:"#64748b",textTransform:"uppercase"}}>Precio base (PVL)</td>
                      <td style={{padding:"10px 12px",textAlign:"center",fontSize:11,color:"#64748b"}}>Equiv.: <strong style={{color:"#374151"}}>{f(calc.neto)}</strong></td>
                      <td style={{padding:"10px 12px",textAlign:"center",fontWeight:700,color:"#b45309"}}>{f(pvlComp)}</td>
                    </tr>
                    <tr style={{borderBottom:"1px solid #f1f5f9"}}>
                      <td style={{padding:"10px 12px",fontWeight:700,fontSize:11,color:"#64748b",textTransform:"uppercase"}}>Dto. s/PVP equivalente</td>
                      <td style={{padding:"10px 12px",textAlign:"center",fontWeight:900,color:"#2563eb",fontSize:16}}>-{p(descLineal)}</td>
                      <td style={{padding:"10px 12px",textAlign:"center",fontWeight:700,color:"#b45309"}}>-{p(calc.dtoPvp)}</td>
                    </tr>
                    <tr style={{background:"#f8fafc",borderBottom:"1px solid #f1f5f9"}}>
                      <td style={{padding:"10px 12px",fontWeight:700,fontSize:11,color:"#64748b",textTransform:"uppercase"}}>Dto. comercial adicional</td>
                      <td style={{padding:"10px 12px",textAlign:"center",fontSize:11,color:"#94a3b8"}}>Ninguno<br/>(precio directo)</td>
                      <td style={{padding:"10px 12px",textAlign:"center"}}>{p(descDto)} s/PVL</td>
                    </tr>
                    <tr style={{borderBottom:"2px solid #e2e8f0"}}>
                      <td style={{padding:"10px 12px",fontWeight:700,fontSize:11,color:"#64748b",textTransform:"uppercase"}}>Bonificación</td>
                      <td style={{padding:"10px 12px",textAlign:"center",fontSize:11,color:"#94a3b8"}}>Sin mínimos</td>
                      <td style={{padding:"10px 12px",textAlign:"center"}}>{tieneOferta ? `${compra}+${regalo} uds.` : "No aplica"}</td>
                    </tr>
                    <tr style={{background:"#eff6ff"}}>
                      <td style={{padding:"13px 12px",fontWeight:900,fontSize:11,textTransform:"uppercase",color:"#1e293b"}}>Coste neto / unidad</td>
                      <td style={{padding:"13px 12px",textAlign:"center",fontWeight:900,fontSize:24,color:"#1d4ed8"}}>{f(calc.neto)}</td>
                      <td style={{padding:"13px 12px",textAlign:"center",fontWeight:700,fontSize:18,color:"#374151"}}>{f(calc.netoComp)}</td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <div style={{background:"#0f172a",color:"#fff",borderRadius:12,padding:"14px 16px",margin:"14px 0",fontSize:13,lineHeight:1.6}}>
                "Un <strong>{p(descLineal)} lineal desde el primer pedido</strong>, sin mínimos de unidades ni referencias. Para igualar este precio, la competencia necesitaría combinar su tarifa base con descuentos adicionales del <strong>{p(100-(calc.neto/(prod.pvp*0.72))*100)}</strong>."
              </div>

              <div style={{fontSize:11,color:"#64748b",borderTop:"1px solid #f1f5f9",paddingTop:10}}>
                <strong style={{color:"#374151"}}>Rápel anual orientativo:</strong> a partir de {rappelE}€ anuales, +{rappelP}% adicional acumulable sobre el descuento vigente.
              </div>

              <div style={{background:"#fef2f2",border:"2px solid #fecaca",borderRadius:12,padding:"12px 14px",marginTop:14,display:"flex",gap:8,alignItems:"flex-start"}}>
                <span style={{fontSize:15,flexShrink:0}}>⚠️</span>
                <p style={{fontSize:11,color:"#b91c1c",lineHeight:1.6}}>
                  <strong>DOCUMENTO NO OFICIAL — SIMULACIÓN IA:</strong> Herramienta informativa generada con Inteligencia Artificial. Los datos de la competencia son estimaciones del usuario. No constituye oferta vinculante de Nutergia ni de ninguna otra empresa.
                </p>
              </div>
            </div>

            <div className="no-print" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <button style={btn("#0f172a")} onClick={()=>window.print()}>⬇ Guardar PDF</button>
              <button style={btn("#15803d")} onClick={exportCSV}>📊 Exportar Excel</button>
            </div>
            <div className="no-print" style={{fontSize:11,color:"#94a3b8",textAlign:"center",marginTop:8}}>El CSV se abre directamente con Excel</div>
          </div>
        )}

        {tab==="ajustes" && (
          <div style={{display:"flex",flexDirection:"column",gap:20}}>
            <div style={{fontWeight:900,fontSize:15,color:"#0f172a",textTransform:"uppercase",letterSpacing:.5}}>Configuración</div>

            <div style={card}>
              <div style={{fontWeight:900,fontSize:13,color:"#374151",marginBottom:4}}>PVL de la competencia por defecto</div>
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:10}}>Al seleccionar un producto, el PVL de la competencia se calcula automáticamente con este descuento sobre el PVP.</div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <input type="range" min="10" max="40" step="1" value={pvlPct}
                  onChange={e=>setPvlPct(+e.target.value)}
                  style={{flex:1,accentColor:"#2563eb"}}
                />
                <span style={{fontWeight:900,fontSize:22,color:"#2563eb",width:50,textAlign:"right"}}>{pvlPct}%</span>
              </div>
            </div>

            <div style={card}>
              <div style={{fontWeight:900,fontSize:13,color:"#374151",marginBottom:4}}>Tramos de descuento propios</div>
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:12}}>Solo por importe total del pedido — sin mínimos de unidades.</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {[
                  {label:"Tramo 1 — desde (€)", val:t1e, set:setT1e},
                  {label:"Dto. T1 (%)",          val:t1d, set:setT1d},
                  {label:"Tramo 2 — desde (€)", val:t2e, set:setT2e},
                  {label:"Dto. T2 (%)",          val:t2d, set:setT2d},
                ].map((f,i)=>(
                  <div key={i}>
                    <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",marginBottom:4}}>{f.label}</div>
                    <input type="number" value={f.val} onChange={e=>f.set(parseFloat(e.target.value)||0)}
                      style={{width:"100%",border:"1.5px solid #e2e8f0",borderRadius:8,padding:"8px 10px",fontSize:18,fontWeight:900,outline:"none",color:"#1e293b"}}
                    />
                  </div>
                ))}
              </div>
            </div>

            <div style={card}>
              <div style={{fontWeight:900,fontSize:13,color:"#374151",marginBottom:4}}>Rápel anual</div>
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:12}}>Acumulable al descuento vigente. Aparece de forma sutil en simulador e informe.</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {[
                  {label:"A partir de (€/año)", val:rappelE, set:setRappelE, step:50},
                  {label:"% Rápel",             val:rappelP, set:setRappelP, step:0.5},
                ].map((f,i)=>(
                  <div key={i}>
                    <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",marginBottom:4}}>{f.label}</div>
                    <input type="number" step={f.step} value={f.val} onChange={e=>f.set(parseFloat(e.target.value)||0)}
                      style={{width:"100%",border:"1.5px solid #e2e8f0",borderRadius:8,padding:"8px 10px",fontSize:18,fontWeight:900,outline:"none",color:"#1e293b"}}
                    />
                  </div>
                ))}
              </div>
              <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,padding:10,marginTop:10,fontSize:12,color:"#374151"}}>
                <strong>Ejemplo:</strong> {t1d}% base + {rappelP}% rápel = <strong style={{color:"#15803d"}}>{(t1d+rappelP).toFixed(1)}% efectivo</strong> al cierre del año.
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}
